<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOM! 실시간 서울 골목길 컨시어지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Pretendard:wght=400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .typing::after { content: ' ⚡'; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-center min-h-screen p-0 sm:p-4">

    <div class="w-full max-w-[440px] h-screen sm:h-[840px] bg-slate-900 border border-slate-800 shadow-2xl overflow-hidden flex flex-col relative rounded-none sm:rounded-3xl">
        
        <div id="onboarding-screen" class="absolute inset-0 z-50 bg-slate-950 p-6 flex flex-col overflow-y-auto">
            <div class="text-center my-4 shrink-0">
                <span class="px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-semibold tracking-wider uppercase font-orbit">Profile (Optional)</span>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 font-orbit mt-2 tracking-tighter">BOOM!</h1>
                <p class="text-slate-400 text-xs mt-1">서울시 실시간 데이터 기반 초정밀 매칭</p>
            </div>

            <div class="space-y-5 flex-1 pr-1">
                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">01. 성별을 선택해줘</label>
                    <div id="gender-group" class="grid grid-cols-2 gap-2">
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-semibold hover:border-slate-500 transition-all text-slate-100" data-value="여성">여성</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-semibold hover:border-slate-500 transition-all text-slate-100" data-value="남성">남성</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs font-bold text-slate-400 block">02. 나이대가 어떻게 돼?</label>
                        <span id="age-val" class="text-xs font-extrabold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded">20대 후반</span>
                    </div>
                    <div class="px-1 py-2">
                        <input id="age-slider" type="range" min="1" max="7" value="3" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                        <div class="flex justify-between text-[10px] text-slate-500 mt-1 px-0.5">
                            <span>10대</span>
                            <span>20대초</span>
                            <span>20대후</span>
                            <span>30대</span>
                            <span>40대</span>
                            <span>50대</span>
                            <span>60대+</span>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">03. 오늘 외출하는 목적이 뭐야?</label>
                    <div id="purpose-group" class="grid grid-cols-2 gap-2">
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="맛집·카페 탐방">☕ 맛집·카페 탐방</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="산책·힐링 나들이">🌳 산책·힐링 나들이</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="쇼핑·문화생활">🎬 쇼핑·문화생활</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="밤샘 피크닉·술한잔">🍻 술한잔·피크닉</button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">04. 누구랑 같이 가?</label>
                    <div id="companion-group" class="grid grid-cols-3 gap-2">
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="혼자만의 시간">혼자</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="연인이랑 데이트">연인</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="친구들과 친목">친구</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold col-span-1" data-value="가족 나들이">가족</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold col-span-2" data-value="반려동물 동반">🐾 반려동물 동반</button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">05. 오늘 이동 수단은?</label>
                    <div id="transport-group" class="grid grid-cols-3 gap-2">
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="대중교통 이용">🚇 대중교통</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="자차 운전(주차필수)">🚗 자차운전</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="도보 또는 따릉이">🚲 도보/따릉이</button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 block mb-2">06. 인파(혼잡도)에 대한 네 성향은?</label>
                    <div id="tolerance-group" class="grid grid-cols-2 gap-2">
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="북적이는 핫플 선호">🔥 사람 많아도 무조건 핫플!</button>
                        <button class="onboard-btn py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-semibold" data-value="여유롭고 한산함 선호">🌿 기빨림 금지! 한산함</button>
                    </div>
                </div>
            </div>

            <div class="pt-4 shrink-0">
                <button id="start-btn" class="w-full py-4 rounded-xl bg-emerald-500 text-slate-950 font-black text-base cursor-pointer hover:bg-emerald-400 active:scale-95 transition-all duration-300 shadow-xl shadow-emerald-500/20 mb-2">
                    분석 엔진 기동하기! BOOM!
                </button>
            </div>
        </div>

        <div id="main-screen" class="hidden flex flex-col h-full w-full">
            <header class="h-16 border-b border-slate-800/80 bg-slate-900/50 backdrop-blur flex justify-between items-center px-4 shrink-0 z-40">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="font-orbit font-black text-lg tracking-wider bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">BOOM! ENGINE</span>
                </div>
                <button id="reset-profile-btn" class="p-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700/60 transition-all" title="프로필 재설정">
                    <i data-lucide="sliders-horizontal" class="w-4 h-4 text-slate-300"></i>
                </button>
            </header>

            <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-900/30">
                <div class="flex gap-3 max-w-[85%]">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-emerald-500 to-cyan-500 flex items-center justify-center font-bold text-xs shrink-0 shadow">🤖</div>
                    <div class="space-y-1 flex-1">
                        <div class="bg-slate-800 border border-slate-700/60 px-4 py-2.5 rounded-2xl rounded-tl-none text-sm leading-relaxed shadow-sm">
                            안녕! 실시간 서울 데이터 컨시어지 BOOM!이야. 💥<br>
                            성수, 홍대, 강남역, 여의도 등 가고 싶은 서울의 주요 핫스팟을 말해줘. <br><br>
                            실시간 공공데이터와 시점 연동 엔진을 결합해서 완벽한 동선과 타이밍을 설계해 줄게!
                        </div>
                    </div>
                </div>
            </main>

            <footer class="p-4 bg-slate-950/60 border-t border-slate-800/60 shrink-0 flex gap-2 items-center">
                <input id="chat-input" type="text" placeholder="예) 다음주 성수 어때?" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500/80 text-slate-100 placeholder-slate-500 transition-all">
                <button id="send-btn" class="w-11 h-11 rounded-xl bg-emerald-500 text-slate-950 flex items-center justify-center font-bold hover:bg-emerald-400 active:scale-95 transition-all shadow-lg shadow-emerald-500/10">
                    <i data-lucide="arrow-up" class="w-5 h-5 stroke-[2.5]"></i>
                </button>
            </footer>
        </div>

    </div>

    <script>lucide.createIcons();</script>
    <script src="places.js"></script>
    <script src="app.js"></script>
</body>
</html>
