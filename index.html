<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOM! - 실시간 서울 골목 컨시어지</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 도도독 흘러나오는 스트리밍 느낌을 위한 커스텀 스타일 */
        .typing::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased flex justify-center items-center min-h-screen p-0 sm:p-4">

    <main class="w-full max-w-md h-[100vh] sm:h-[850px] bg-slate-900 sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden relative border border-slate-800">
        
        <section id="onboarding-screen" class="flex-1 flex flex-col justify-between p-6 z-10">
            <div class="space-y-8 mt-6">
                <div class="text-center space-y-2">
                    <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">BOOM! 💥</h1>
                    <p class="text-sm text-slate-400 font-medium">내가 지금 가려는 곳, 얼마나 BOOM빌까?</p>
                </div>

                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-400 tracking-wider uppercase">성별</label>
                        <div class="grid grid-cols-2 gap-3" id="gender-group">
                            <button data-value="여성" class="onboard-btn p-3 rounded-xl bg-slate-800 border border-slate-700 font-medium active:scale-95 transition-all text-center">여성</button>
                            <button data-value="남성" class="onboard-btn p-3 rounded-xl bg-slate-800 border border-slate-700 font-medium active:scale-95 transition-all text-center">남성</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-400 tracking-wider uppercase">나이대</label>
                        <div class="grid grid-cols-3 gap-2" id="age-group">
                            <button data-value="10대" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">10대</button>
                            <button data-value="20대" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">20대</button>
                            <button data-value="30대" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">30대</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-400 tracking-wider uppercase">나들이 목적</label>
                        <div class="grid grid-cols-2 gap-2" id="purpose-group">
                            <button data-value="데이트" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">👩‍❤️‍👨 데이트</button>
                            <button data-value="혼밥/작업" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">☕ 혼밥/작업</button>
                            <button data-value="친구와 친목" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">🔥 친구와 친목</button>
                            <button data-value="가족 나들이" class="onboard-btn p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium active:scale-95 transition-all">🌳 가족 나들이</button>
                        </div>
                    </div>
                </div>
            </div>

            <button id="start-btn" disabled class="w-full py-4 rounded-xl bg-slate-700 text-slate-400 font-bold text-base cursor-not-allowed transition-all duration-300 shadow-lg shadow-emerald-500/10 mb-4">
                프로필을 선택해 주세요
            </button>
        </section>

        <section id="main-screen" class="flex-1 flex flex-col hidden overflow-hidden">
            <header class="p-4 bg-slate-900/50 backdrop-blur border-b border-slate-800 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <span class="text-xl font-black tracking-wider text-emerald-400">BOOM!</span>
                    <span class="text-xs px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 text-slate-400 font-mono">SEOUL LIVE</span>
                </div>
                <button id="reset-profile-btn" class="text-xs text-slate-500 hover:text-slate-300 transition-all flex items-center gap-1">
                    <i data-lucide="user" class="w-3.5 h-3.5"></i> 프로필 변경
                </button>
            </header>

            <div class="p-3 bg-slate-900/30 border-b border-slate-800/50 flex gap-2 overflow-x-auto shrink-0">
                <button class="px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs font-medium text-slate-300 hover:border-emerald-500 active:scale-95 transition-all shrink-0">🌳 한강/공원</button>
                <button class="px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs font-medium text-slate-300 hover:border-emerald-500 active:scale-95 transition-all shrink-0">🛍️ 홍대/성수 상권</button>
                <button class="px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs font-medium text-slate-300 hover:border-emerald-500 active:scale-95 transition-all shrink-0">🏛️ 서촌/고궁</button>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-950/20">
                <div class="flex gap-3 max-w-[85%]">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-emerald-500 to-cyan-500 flex items-center justify-center font-bold text-xs shrink-0 shadow">🤖</div>
                    <div class="space-y-1">
                        <div class="bg-slate-800 border border-slate-700/60 px-4 py-2.5 rounded-2xl rounded-tl-none text-sm leading-relaxed shadow-sm">
                            반가워요! 다음 주에 가고 싶은 서울의 핫스팟이 있나요? 💥 언제 가야 덜 붐비고 알차게 보낼 수 있을지 완벽한 가이드를 짜드릴게요. "다음 주 홍대 어때?" 처럼 편하게 물어보세요!
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-900/80 backdrop-blur border-t border-slate-800 shrink-0">
                <div class="flex gap-2 bg-slate-950 border border-slate-800 rounded-xl p-1.5 focus-within:border-emerald-500/50 transition-all">
                    <input id="chat-input" type="text" placeholder="어디로 놀러 가실 건가요?..." class="flex-1 bg-transparent px-3 py-2 text-sm text-slate-100 outline-none placeholder:text-slate-600">
                    <button id="send-btn" class="w-9 h-9 rounded-lg bg-emerald-500 text-slate-950 flex items-center justify-center font-bold hover:bg-emerald-400 active:scale-95 transition-all shadow-md shadow-emerald-500/20">
                        <i data-lucide="arrow-up" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>lucide.createIcons();</script>
<script>lucide.createIcons();</script>
    
    <script src="places.js"></script> 
    <script src="app.js"></script>
</body>
</html>
    <script src="app.js"></script>
</body>
</html>
